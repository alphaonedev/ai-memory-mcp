# v0.7.0 L0.7-7 — per-module coverage threshold gate (discipline keystone).
#
# Per L0.7 playbook §8: this workflow enforces per-module CURRENT-floor
# coverage thresholds defined in coverage/thresholds.toml. Thresholds
# rise across releases; NEVER fall. If a module drops below its
# threshold, this job fails and the PR cannot merge until coverage is
# restored.
#
# Complementary to the `Code Coverage` job in `ci.yml`:
#   - `Code Coverage` (ci.yml) enforces the absolute floor + ratchet on
#     TOTAL line coverage (catastrophic-regression backstop).
#   - `Per-Module Coverage Thresholds` (this file) enforces a per-module
#     floor so that no single module can quietly slide while the workspace
#     average stays high.
#
# v0.7.0 ship-hardening (2026-05-20) — instrument with live PG+AGE+pgvector
# service container so postgres-store tests connect at runtime instead of
# skipping. Without this, `store/postgres.rs` (5852 executable lines) is
# effectively uncovered and the workspace total drops ~4.10pp — masking
# regressions on the postgres backend. The apache/age:release_PG16_1.6.0
# base image has AGE+postgres; pgvector is installed at service-start via
# the runtime `postgresql-16-pgvector` apt package. Mirror of the
# `infra/lan-parity-test/` Docker stack the Tier 4 cov audit used.

name: Per-Module Coverage Thresholds

on:
  pull_request:
    branches: [main, develop, "release/**", "feat/v0.7.0-grand-slam"]
  push:
    branches: [main, develop, "feat/v0.7.0-grand-slam", "release/**"]

# v0.7.x (#1148) — cancel stale runs on a PR when a new push lands.
# Fork-PR-safe concurrency key: coalesces push + same-branch internal
# PR events; isolates fork PRs by PR number. See ci.yml for full
# rationale + the prior unsafe-key incident that motivated this shape.
concurrency:
  group: cov-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AI_MEMORY_NO_CONFIG: "1"
  # Pin the postgres-store test URL so postgres-backed integration
  # tests (`live_*` / `serve_postgres_*` / `g[1-9]_postgres_*` /
  # `federation_dlq_replay`) connect to the service container below
  # instead of skipping their `let Some(url) = postgres_url() else { return };`
  # guard.
  AI_MEMORY_TEST_POSTGRES_URL: "postgres://ai_memory:ai_memory_test@127.0.0.1:5432/ai_memory_test"
  AI_MEMORY_TEST_AGE_URL: "postgres://ai_memory:ai_memory_test@127.0.0.1:5432/ai_memory_test"

jobs:
  # Issue #1343 — docs-only PRs should skip the heavy llvm-cov sweep.
  # Mirrors the same classify pattern used by `.github/workflows/ci.yml`
  # (see the classify job there for the canonical implementation).
  # When `docs_only == 'true'`, the `per-module-thresholds` job below
  # is skipped, which GitHub reports as `status: skipping` on the PR
  # check page — branch-protection treats a skipped required check as
  # passing (same handling that ci.yml's downstream jobs already rely
  # on for docs-only PRs).
  classify:
    name: Coverage classify (docs-only short-circuit)
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.cls.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: cls
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
          else
            base=""
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$base" >/dev/null 2>&1; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cannot resolve base commit ($base) — running full pipeline"
            exit 0
          fi
          # Per issue #1193 / PR #1203 — fetch-depth=2 is too shallow
          # when the PR base SHA is more than one commit behind the
          # merge ref. Fetch on demand if the base tree isn't local.
          if ! git cat-file -e "$base^{tree}" 2>/dev/null; then
            git fetch --depth=50 origin "$base" 2>/dev/null || \
              git fetch --depth=200 origin "$base" 2>/dev/null || \
              git fetch --unshallow origin 2>/dev/null || true
          fi
          if ! git cat-file -e "$base^{tree}" 2>/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cannot fetch base tree ($base) after retry — running full pipeline"
            exit 0
          fi
          changed=$(git diff --name-only "$base" HEAD)
          if [ -z "$changed" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::no diff vs base — treating as docs-only no-op"
            exit 0
          fi
          # docs-only iff every changed file matches docs/** OR *.md anywhere
          if echo "$changed" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::changed files include non-docs paths — running full pipeline"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::all changed files are docs-only — skipping heavy llvm-cov sweep"
          fi

  per-module-thresholds:
    name: Per-Module Coverage Thresholds
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    permissions:
      contents: read
      pull-requests: write
    services:
      # Live PG + Apache AGE 1.6.0 (graph extension on PostgreSQL 16).
      # The pgvector extension is layered in via the
      # `Install pgvector + provision AGE/vector extensions` step below
      # because the upstream `apache/age` image doesn't ship pgvector
      # by default. Mirrors `infra/lan-parity-test/docker-compose.yml`
      # exactly so the live-PG coverage measurement on this CI matches
      # what the Tier 4 audit measured locally (92.58% workspace).
      pg-age:
        image: apache/age:release_PG16_1.6.0
        env:
          POSTGRES_USER: ai_memory
          POSTGRES_PASSWORD: ai_memory_test
          POSTGRES_DB: ai_memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_memory -d ai_memory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # v0.7.x (#1148) — route every Rust link step through `mold`
      # instead of the default `ld.bfd`. mold uses 2-4× less RSS than
      # ld.bfd, eliminating the `collect2: signal 7 [Bus error]`
      # linker-OOM that previously failed this gate on the 7 GB
      # ubuntu-latest runner under the heavy `--features
      # sal,sal-postgres` instrumented build.
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      # Trim DWARF + LTO via env-var overrides on the dev profile
      # (NOT `--profile coverage`) so cargo-llvm-cov's report step
      # finds the artifact dir at its default `debug/` path.
      CARGO_PROFILE_DEV_DEBUG: "1"
      CARGO_PROFILE_DEV_LTO: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk + add swap (#1148 belt-and-suspenders, aggressive)
        run: |
          # Aggressive cleanup — the sal+sal-postgres instrumented
          # coverage build's target/llvm-cov-target/ can exceed 20 GB
          # under heavy integration-test instrumentation. Free
          # everything we don't need before building.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/powershell /usr/local/share/chromium \
                      /usr/local/share/boost /usr/local/lib/node_modules \
                      /opt/google /usr/lib/jvm /opt/microsoft \
                      /usr/share/swift /usr/share/miniconda || true
          sudo docker system prune -af --volumes || true
          sudo apt-get autoremove --purge -y || true
          sudo apt-get clean
          # Swap on /mnt (the ephemeral data disk, ~70 GB) so the 8 GB
          # doesn't eat into the root partition.
          sudo fallocate -l 8G /mnt/swapfile-1148
          sudo chmod 600 /mnt/swapfile-1148
          sudo mkswap /mnt/swapfile-1148
          sudo swapon /mnt/swapfile-1148
          echo "::group::memory + disk after"
          free -h
          df -h /
          df -h /mnt
          echo "::endgroup::"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install mold linker (#1148)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          mold --version

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install jq + postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y jq postgresql-client

      - name: Install pgvector + provision AGE/vector extensions
        env:
          PGPASSWORD: ai_memory_test
        run: |
          set -euo pipefail
          # Locate the pg-age service container so we can apt-get
          # install pgvector against the same Debian-based image
          # (apache/age inherits debian-bookworm via postgres:16).
          PG_CONTAINER=$(docker ps --filter "ancestor=apache/age:release_PG16_1.6.0" --format '{{.ID}}' | head -1)
          echo "pg container: $PG_CONTAINER"
          docker exec "$PG_CONTAINER" apt-get update
          docker exec "$PG_CONTAINER" apt-get install -y postgresql-16-pgvector
          # Provision extensions + the memory_graph AGE graph the SAL
          # postgres adapter expects. Mirrors infra/lan-parity-test/init-age.sql.
          psql -h 127.0.0.1 -p 5432 -U ai_memory -d ai_memory_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -p 5432 -U ai_memory -d ai_memory_test -c "LOAD 'age'; SET search_path = ag_catalog, \"\$user\", public; SELECT ag_catalog.create_graph('memory_graph');" || echo "memory_graph already exists or AGE init handled by ladder"
          # Sanity check: extensions present.
          psql -h 127.0.0.1 -p 5432 -U ai_memory -d ai_memory_test -c "SELECT extname FROM pg_extension ORDER BY extname;"

      - name: Generate coverage JSON
        # v0.7.x (#1148) — dev profile (default) WITH env-var
        # overrides from the job-level `env:` block above
        # (debuginfo=1, lto=false). Keeps artifacts under the default
        # `target/llvm-cov-target/debug/` path so downstream report
        # tooling (and the threshold checker) finds them, while still
        # trimming the instrumented binary enough that mold can link
        # it under the 7 GB runner ceiling.
        run: |
          mkdir -p coverage
          cargo llvm-cov \
            --features sal,sal-postgres \
            --lib --tests \
            --json \
            --output-path coverage/current.json \
            --workspace \
            -- --test-threads=2

      - name: Enforce per-module thresholds
        run: |
          bash coverage/check-thresholds.sh \
            coverage/thresholds.toml \
            coverage/current.json

      - name: Upload coverage JSON
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-json
          path: coverage/current.json
