name: CI

# This workflow performs VERIFICATION ONLY: lint, cross-platform check
# matrix, feature-gate jobs, dockerfile-validate, code coverage. It does
# NOT publish releases — that lives in `release.yml` and only fires from
# an explicit `workflow_dispatch` invocation (operator-gated). The
# separation is deliberate: ci.yml passing on a tag-push is necessary
# but not sufficient for publication; a maintainer must run
#   gh workflow run release.yml --repo alphaonedev/ai-memory-mcp -f tag=v0.7.0
# to actually ship.
#
# See `release.yml` for the publish pipeline (binary builds, GitHub
# Release page, crates.io, Homebrew tap, GHCR Docker image, Fedora COPR).
#
# 2026-05-27 — full-pipeline re-validation triggered post-CI-flake-closure
# sweep (#1372 / #1373 / #1334 closures landed via PRs #1375 / #1376 /
# #1377; the immediate post-merge HEAD short-circuited because the PR
# #1377 merge commit was docs-only). Local pm-v3.3 recompile-retest on
# HEAD 0e30d23f6 returned 7,332 / 0 / 16 across 309 binaries — a strict
# superset of the 2026-05-22 dossier baseline; this push refreshes the
# integrated full-platform CI signal as Tier 1 ship-gate evidence.

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, "release/**"]

# Concurrency: coalesces `push` + same-branch internal `pull_request`
# events while keeping fork PRs isolated.
#
# Expression chain (evaluated left-to-right via && / ||):
#   - INTERNAL PR (head.repo == upstream): key = head.ref
#     → SAME branch name as the push event → coalesces correctly.
#       Example: push to release/v0.7.0 AND the PR #N (release/v0.7.0
#       → main) synchronize event both produce key
#       "ci-CI-release/v0.7.0".
#   - FORK PR (head.repo != upstream): key = pull_request.number
#     → unique integer, cannot collide with protected-branch refs.
#       Example: fork PR with head.ref="release/v0.7.0" gets key
#       "ci-CI-<PR#>", which never matches an upstream push.
#   - PUSH event: key = github.ref_name (branch name, no refs/ prefix).
#
# v0.7.0 (2026-05-31, operator directive "fix it all 100%") —
# Pre-fix, both push and pull_request triggers fired concurrently on
# every push to a branch with an open PR (release/v0.7.0 → main),
# producing 2 CI runs per push (~2x CI cost).
#
# Earlier "head.ref || ref_name" key (2b83bc6ea) coalesced correctly
# for same-branch events but enabled a fork-PR DoS: an attacker could
# open a fork PR with head.ref="release/v0.7.0" to share the upstream
# branch's group, then trigger cancel-in-progress against the
# protected-branch CI. The chained key below restricts the coalescing
# to head.repo==github.repository (internal-PR / maintainer paths) so
# fork PRs cannot collide with branch keys.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref || github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Classify the diff so docs-only PRs can short-circuit the heavy Rust
  # matrix instead of waiting ~12 min for Windows. Required status checks
  # are still satisfied because the matrix jobs keep their names AND
  # complete with status SUCCESS — they just no-op on docs-only diffs.
  classify:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.cls.outputs.docs_only }}
      # v0.7.0 Task #12 (#1399) — test-impact selection output.
      # Possible values:
      #   __SKIP__   docs-only diff (no Rust pipeline)
      #   __ALL__    foundational change OR fallback (full integration suite)
      #   <names>    space-separated tests/*.rs binary names to dispatch
      # Consumed by the `Run tests` steps in `check` + `postgres-feature`.
      # The consumer ALWAYS runs `cargo test --lib` regardless of this
      # value; impact selection optimises only the slow tests/*.rs
      # integration binaries (~5-15s setup per binary).
      test_impact: ${{ steps.cls.outputs.test_impact }}
      test_impact_count: ${{ steps.cls.outputs.test_impact_count }}
      test_impact_total: ${{ steps.cls.outputs.test_impact_total }}
      test_impact_reason: ${{ steps.cls.outputs.test_impact_reason }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: cls
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
          else
            base=""
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$base" >/dev/null 2>&1; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "test_impact=__ALL__" >> "$GITHUB_OUTPUT"
            echo "test_impact_count=ALL" >> "$GITHUB_OUTPUT"
            echo "test_impact_total=ALL" >> "$GITHUB_OUTPUT"
            echo "test_impact_reason=base-unreachable" >> "$GITHUB_OUTPUT"
            echo "::notice::cannot resolve base commit ($base) — running full pipeline"
            exit 0
          fi
          # Per issue #1193 PR #1203 — `fetch-depth: 2` is too shallow
          # when the PR base SHA is more than 1 commit behind the
          # PR-merge ref; `git rev-parse $base` returns the SHA from
          # GitHub's pull/N/merge representation but the tree itself
          # isn't downloaded, so `git diff $base HEAD` fails with
          # `fatal: bad object`. Fetch the base commit on demand
          # before the diff. This is a no-op when fetch-depth was
          # already deep enough.
          if ! git cat-file -e "$base^{tree}" 2>/dev/null; then
            git fetch --depth=50 origin "$base" 2>/dev/null || \
              git fetch --depth=200 origin "$base" 2>/dev/null || \
              git fetch --unshallow origin 2>/dev/null || true
          fi
          if ! git cat-file -e "$base^{tree}" 2>/dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "test_impact=__ALL__" >> "$GITHUB_OUTPUT"
            echo "test_impact_count=ALL" >> "$GITHUB_OUTPUT"
            echo "test_impact_total=ALL" >> "$GITHUB_OUTPUT"
            echo "test_impact_reason=base-fetch-failed" >> "$GITHUB_OUTPUT"
            echo "::notice::cannot fetch base tree ($base) after retry — running full pipeline"
            exit 0
          fi
          changed=$(git diff --name-only "$base" HEAD)
          if [ -z "$changed" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "test_impact=__SKIP__" >> "$GITHUB_OUTPUT"
            echo "test_impact_count=0" >> "$GITHUB_OUTPUT"
            echo "test_impact_total=0" >> "$GITHUB_OUTPUT"
            echo "test_impact_reason=empty-diff" >> "$GITHUB_OUTPUT"
            echo "::notice::no diff vs base — treating as docs-only no-op"
            exit 0
          fi
          # docs-only iff every changed file matches docs/** OR *.md anywhere
          if echo "$changed" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "::notice::code changes detected — running full pipeline"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::docs-only diff — skipping Rust pipeline"
          fi
          echo "--- Changed files ($(echo "$changed" | wc -l) files) ---"
          echo "$changed"

          # v0.7.0 Task #12 (#1399) — compute test-impact set.
          # Always runs; the consumer steps decide whether to honor
          # the output based on docs_only. The script is self-contained
          # POSIX-compatible bash; full discipline + foundational list
          # documented inline in scripts/ci-test-impact.sh.
          chmod +x scripts/ci-test-impact.sh
          scripts/ci-test-impact.sh "$base" "HEAD"

  # Fast lint job — fmt + clippy on ubuntu only. Toolchain-portable, no
  # need to run on macOS/Windows where it just duplicates work and burns
  # ~3 min per platform. Advisory (not in required-status-checks) so
  # safe to skip entirely on docs-only diffs at the job level.
  lint:
    name: Lint (fmt + clippy)
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings -D clippy::all -D clippy::pedantic

  # Cross-platform correctness matrix. These job names are required by
  # branch protection on main/develop/release/**, so the jobs MUST run
  # and complete SUCCESS even on docs-only PRs. Per-step `if:` makes the
  # heavy work skip on docs-only diffs while the job still returns green
  # in <30 seconds.
  check:
    name: Check (${{ matrix.os }})
    needs: classify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: docs-only short-circuit
        if: needs.classify.outputs.docs_only == 'true'
        run: echo "::notice::docs-only PR — ${{ matrix.os }} matrix is a no-op"

      # #1407 / #1405 / #1387 — free disk BEFORE Install Rust +
      # Swatinem/rust-cache + Run tests. The runner image ships with
      # ~14 GiB free; doctest linking under `cargo test` blows past
      # the tmpfs ceiling once libai_memory's dep closure grew
      # (PR #1397 L1-L4 capture work added ~80 files), producing
      # `collect2: fatal error: ld terminated with signal 7
      # [Bus error]` deterministically (#1407). Pruning ~35 GiB of
      # unused runner tooling (.NET / CodeQL / Android SDK / GHC)
      # here — BEFORE any cargo step — also keeps the partition
      # where the actions-runner writes its own _diag/Worker_*.log
      # tracing well clear of ENOSPC (#1405). Same root partition
      # serves both, so one early cleanup closes both surfaces.
      # Pure-shell fix per project no-external-code-injection rule
      # (CLAUDE.md §"Sole-authority operator"). Each `rm -rf` is
      # best-effort — runner image contents may shift between
      # versions, and a missing path is benign.
      - name: Free disk before tests (ubuntu-latest, #1407/#1405/#1387 fix)
        if: needs.classify.outputs.docs_only != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          set -eu
          echo "::group::Disk usage before cleanup"
          df -h /
          echo "::endgroup::"
          sudo rm -rf /usr/share/dotnet              || true  # ~17 GiB
          sudo rm -rf /opt/hostedtoolcache/CodeQL    || true  # ~5 GiB
          sudo rm -rf /usr/local/lib/android         || true  # ~13 GiB
          sudo rm -rf /opt/ghc                       || true  # ~5 GiB
          sudo apt-get clean
          echo "::group::Disk usage after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Install Rust stable
        if: needs.classify.outputs.docs_only != 'true'
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        if: needs.classify.outputs.docs_only != 'true'

      # v0.7.0 Task #12 (#1399) — test-impact-aware test dispatch.
      # ALWAYS runs `cargo test --lib` so every inline `#[cfg(test)] mod
      # tests` in `src/` exercises on every push (huge surface, one
      # compile-once / link-once pass). Then dispatches the slow
      # `tests/*.rs` integration binaries selectively:
      #   __ALL__   → `cargo test` (full suite, the v0.6.x posture)
      #   __SKIP__  → no-op (docs-only diff)
      #   <names>   → `cargo test --lib --test t1 --test t2 ...`
      # The `classify` job's foundational-fallback list (in
      # scripts/ci-test-impact.sh) HARD-FORCES __ALL__ on any change
      # to a cross-cutting surface (Cargo.toml, src/lib.rs, schema
      # migrations, SAL trait, MCP dispatch, etc.) — false-positive
      # is always preferred over false-negative per discipline rule.
      # Parity-test invariants (route_count_invariant,
      # cli_subcommand_count_invariant, memory_link_relation_count_invariant,
      # etc.) are always-on in the impact set so cross-cutting drift
      # the heuristic might otherwise miss still fails the build.
      - name: Run tests (impact-aware)
        if: needs.classify.outputs.docs_only != 'true'
        env:
          AI_MEMORY_NO_CONFIG: "1"
          TEST_IMPACT: ${{ needs.classify.outputs.test_impact }}
          TEST_IMPACT_REASON: ${{ needs.classify.outputs.test_impact_reason }}
          TEST_IMPACT_COUNT: ${{ needs.classify.outputs.test_impact_count }}
          TEST_IMPACT_TOTAL: ${{ needs.classify.outputs.test_impact_total }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::test-impact decision"
          echo "reason: ${TEST_IMPACT_REASON:-unset}"
          echo "count:  ${TEST_IMPACT_COUNT:-unset} / ${TEST_IMPACT_TOTAL:-unset}"
          echo "impact: ${TEST_IMPACT:-unset}"
          echo "::endgroup::"
          case "${TEST_IMPACT:-__ALL__}" in
            __SKIP__)
              echo "::notice::docs-only diff — test step is a no-op"
              ;;
            __ALL__|"")
              echo "::notice::running FULL test suite"
              cargo test
              ;;
            *)
              # Always run --lib first (catches every inline unit test)
              echo "::notice::running cargo test --lib + impact-selected integration binaries"
              cargo test --lib
              # Dispatch each impacted tests/*.rs binary
              ARGS=()
              for t in $TEST_IMPACT; do
                ARGS+=(--test "$t")
              done
              cargo test "${ARGS[@]}"
              ;;
          esac

      - name: Security audit
        if: needs.classify.outputs.docs_only != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --locked
          cargo audit

      # Drop dev-profile artefacts now that the test step is complete
      # so the subsequent `cargo build --release` link has headroom on
      # the ubuntu-latest tmpfs. Keeps the dep cache (proc-macros,
      # build-scripts) so the release build doesn't recompile from
      # scratch. The big runner-image cleanup ran earlier (see
      # 'Free disk before tests' step above, #1407/#1405).
      - name: Trim target/debug before release build (ubuntu-latest)
        if: needs.classify.outputs.docs_only != 'true' && matrix.os == 'ubuntu-latest'
        run: |
          set -eu
          echo "::group::Disk usage before cargo clean"
          df -h /
          du -sh target 2>/dev/null || true
          echo "::endgroup::"
          cargo clean --profile dev || true
          echo "::group::Disk usage after cargo clean"
          df -h /
          du -sh target 2>/dev/null || true
          echo "::endgroup::"

      - name: Build release
        if: needs.classify.outputs.docs_only != 'true'
        run: cargo build --release

  # M16 — Postgres-feature gate. The cross-platform `check` matrix above
  # exercises the default build only; the `sal-postgres` adapter relies on
  # sqlx + pgvector + AGE (Apache AGE 1.5 on Postgres 16), which is
  # Linux-only at build-time. This job adds:
  #   1. A service container running postgres:16 with pgvector + AGE
  #      preinstalled (image: pgvector/pgvector:pg16, then `CREATE
  #      EXTENSION age` inside the SAL test fixture).
  #   2. `cargo test --features sal-postgres` exercising BOTH the lib
  #      unit suite AND the 17 postgres integration test binaries
  #      (`tests/{g1..g5,governance_postgres,postgres_schema_parity,
  #      s79_postgres,sal_v07_postgres,serve_postgres_*,
  #      federation_postgres_*}.rs`). Until v0.7.0 cluster-I this job
  #      ran with `--lib`, which silently excluded the integration
  #      binaries — ~56 `#[tokio::test]` cases compiled but never ran
  #      under the feature gate (issue #767, finding COV-1). Tests
  #      gated by `AI_MEMORY_TEST_POSTGRES_URL` (e.g.
  #      g3_postgres_verify_link_signature_roundtrip,
  #      postgres_memory_kind_backfill) self-skip when the URL is
  #      unset; the AI_MEMORY_TEST_POSTGRES_URL set below switches
  #      them on against the service container.
  #   3. Clippy pedantic at the same feature gate so the postgres-only
  #      code paths inherit the same lint budget as the default build.
  # The lint advisory job above (`lint`) only runs `cargo clippy` at
  # default features, so a `clippy::pedantic` lint regression that only
  # surfaces with `sal-postgres` would otherwise slip through.
  # Skipped on docs-only PRs alongside the rest of the heavy matrix.
  postgres-feature:
    name: Postgres feature gate
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    env:
      # v0.7.x (#1148) — mold linker + line-only DWARF to keep peak
      # linker RSS under the 7 GB ubuntu-latest ceiling for the heavy
      # `--features sal-postgres` build (sqlx + sqlx-postgres + AGE +
      # pgvector = massive symbol table).
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      # Downgrade dev-profile debug info from level 2 (full DWARF)
      # to level 1 (line tables only). The Postgres feature gate
      # uses the dev profile via `cargo test`, not the `coverage`
      # profile, so the env-var override is the cleanest knob.
      CARGO_PROFILE_DEV_DEBUG: "1"
    services:
      postgres:
        # pgvector/pgvector:pg16 ships postgres 16 with pgvector already
        # built; AGE is `CREATE EXTENSION`-installed by the
        # `serve_postgres_smoke` fixture when AI_MEMORY_TEST_POSTGRES_URL
        # is set. If a future AGE-as-a-service container appears, swap
        # this image; the rest of the job stays.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ai_memory
          POSTGRES_PASSWORD: ai_memory_ci
          POSTGRES_DB: ai_memory_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_memory -d ai_memory_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Free disk + add swap (#1148 belt-and-suspenders, aggressive)
        run: |
          # Aggressive cleanup — the sal+sal-postgres instrumented
          # coverage build's target/llvm-cov-target/ can exceed 20 GB
          # under heavy integration-test instrumentation. Free
          # everything we don't need before building.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/powershell /usr/local/share/chromium \
                      /usr/local/share/boost /usr/local/lib/node_modules \
                      /opt/google /usr/lib/jvm /opt/microsoft \
                      /usr/share/swift /usr/share/miniconda || true
          sudo docker system prune -af --volumes || true
          sudo apt-get autoremove --purge -y || true
          sudo apt-get clean
          # Swap on /mnt (the ephemeral data disk, ~70 GB) so the 8 GB
          # doesn't eat into the root partition.
          sudo fallocate -l 8G /mnt/swapfile-1148
          sudo chmod 600 /mnt/swapfile-1148
          sudo mkswap /mnt/swapfile-1148
          sudo swapon /mnt/swapfile-1148
          echo "::group::memory + disk after"
          free -h
          df -h /
          df -h /mnt
          echo "::endgroup::"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install mold linker (#1148)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          mold --version

      - uses: Swatinem/rust-cache@v2

      - name: Wait for postgres readiness
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U ai_memory -d ai_memory_ci >/dev/null 2>&1; then
              echo "::notice::postgres is up"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::postgres did not become ready within 60s — postgres-gated tests will soft-skip"

      - name: Clippy (sal-postgres feature, lib + tests)
        run: cargo clippy --features sal-postgres --tests -- -D warnings -D clippy::all -D clippy::pedantic

      - name: Run lib + integration tests (sal-postgres feature, impact-aware)
        env:
          AI_MEMORY_NO_CONFIG: "1"
          # Soft-skip pattern: postgres-gated integration tests check
          # this var and self-skip if absent. We set it so the AGE-gated
          # tests at least attempt the connection; when AGE isn't
          # available those tests log a skip and exit 0 (see
          # `tests/age_cte_equivalence.rs` for the gating logic).
          AI_MEMORY_TEST_POSTGRES_URL: postgres://ai_memory:ai_memory_ci@localhost:5432/ai_memory_ci
          TEST_IMPACT: ${{ needs.classify.outputs.test_impact }}
          TEST_IMPACT_REASON: ${{ needs.classify.outputs.test_impact_reason }}
          TEST_IMPACT_COUNT: ${{ needs.classify.outputs.test_impact_count }}
          TEST_IMPACT_TOTAL: ${{ needs.classify.outputs.test_impact_total }}
        shell: bash
        # v0.7.0 Task #12 (#1399) — test-impact-aware dispatch over the
        # sal-postgres feature gate. Same triage tree as the default
        # `check` job's test step plus:
        # 1. The `--features sal-postgres` flag is non-negotiable —
        #    that's the entire point of this gate (lib + 17 postgres
        #    integration binaries that the default build doesn't
        #    compile).
        # 2. `-- --test-threads=1` serialises postgres-init DDL across
        #    workers. Cluster-I (COV-1, issue #767): dropping `--lib`
        #    so integration binaries actually run; pre-#767 only the
        #    lib unit suite executed under this gate.
        # 3. The impact-selected branch ALSO passes
        #    `-- --test-threads=1` for the same per-DDL serialisation
        #    discipline.
        run: |
          set -euo pipefail
          echo "::group::sal-postgres test-impact decision"
          echo "reason: ${TEST_IMPACT_REASON:-unset}"
          echo "count:  ${TEST_IMPACT_COUNT:-unset} / ${TEST_IMPACT_TOTAL:-unset}"
          echo "impact: ${TEST_IMPACT:-unset}"
          echo "::endgroup::"
          case "${TEST_IMPACT:-__ALL__}" in
            __SKIP__)
              echo "::notice::docs-only diff — sal-postgres test step is a no-op"
              ;;
            __ALL__|"")
              echo "::notice::running FULL sal-postgres test suite"
              cargo test --features sal-postgres -- --test-threads=1
              ;;
            *)
              echo "::notice::running --lib + impact-selected sal-postgres integration binaries"
              cargo test --features sal-postgres --lib -- --test-threads=1
              ARGS=()
              for t in $TEST_IMPACT; do
                ARGS+=(--test "$t")
              done
              cargo test --features sal-postgres "${ARGS[@]}" -- --test-threads=1
              ;;
          esac

  # v0.7.0 Posture-1a (issue #1068) — mobile cross-compile gate.
  # Verifies that the `--features sqlite-bundled --lib` build cross-compiles
  # cleanly for the two mobile Rust targets the v0.7.0 §1067 Posture-1a
  # row claims (iPhone via `aarch64-apple-ios`, Android via
  # `aarch64-linux-android`). Catches ~80% of mobile-bit-rot risk: any
  # crate update that drops mobile portability (introduces a pthread-only
  # / OpenSSL / libc-gap dependency, etc.) surfaces here instead of
  # silently breaking integration when a downstream app developer tries
  # to consume the v0.7.x release artifacts. The job is `--lib` only —
  # we never build a CLI binary for mobile; the consumer is FFI from an
  # iOS / Android app. Skipped on docs-only PRs alongside the rest of
  # the heavy matrix. CI cost: ~5-8 min per target on a cold cache, ~1
  # min on a warm cache; well under the $5/mo budget the issue projected.
  mobile-cross-compile:
    name: Cross-compile (${{ matrix.target }})
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # iOS device — cross-compiled on macOS so the Apple SDK
          # (`xcrun --sdk iphoneos --show-sdk-path`) is in place for
          # the C bits of rusqlite's bundled SQLite.
          - target: aarch64-apple-ios
            os: macos-latest
          # Android arm64 — cross-compiled on Linux with the NDK toolchain
          # providing the `aarch64-linux-android-clang` C compiler that
          # rusqlite-sys's build.rs invokes for the bundled SQLite C code.
          - target: aarch64-linux-android
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (target ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: mobile-${{ matrix.target }}

      # Android NDK r26d — provides the clang toolchain we point at via
      # CC_aarch64_linux_android / AR_aarch64_linux_android below so the
      # bundled SQLite C blob compiles against the Android sysroot
      # instead of the host's. r26d is the latest LTS at the time of
      # writing; bumps tracked alongside Rust stable cadence.
      - name: Install Android NDK r26d
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Configure NDK toolchain for cargo
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          set -euo pipefail
          NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          test -x "$TC/aarch64-linux-android24-clang" || {
            echo "::error::NDK clang for android24 not found at $TC"
            ls "$TC" | head -40
            exit 1
          }
          # Bundled SQLite (rusqlite/bundled feature) compiles its C
          # blob via the `cc` crate, which honors the per-target
          # CC_<target_underscores> and AR_<target_underscores> env
          # vars. We point them at the NDK's clang + llvm-ar so the C
          # bits link against the Android sysroot, not the host's.
          # min-sdk 24 (Android 7.0+) — matches the floor v0.7.0
          # Posture-1a documents in ROADMAP §1067.
          {
            echo "CC_aarch64_linux_android=$TC/aarch64-linux-android24-clang"
            echo "CXX_aarch64_linux_android=$TC/aarch64-linux-android24-clang++"
            echo "AR_aarch64_linux_android=$TC/llvm-ar"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TC/aarch64-linux-android24-clang"
          } >> "$GITHUB_ENV"

      - name: cargo check (--lib --features sqlite-bundled)
        run: |
          cargo check \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features sqlite-bundled \
            --lib

  # v0.7.0 Phase D regression closeout — `sal`-only feature gate. The
  # `check` matrix above builds the default (sqlite-bundled only) and
  # `postgres-feature` builds `sal-postgres` (which transitively enables
  # sal). Neither exercises the `sqlite-bundled + sal` combination —
  # the exact build config the A2A campaign workflow + most production
  # daemons use (`cargo build --release --features sal`). A Phase D
  # round caught a real regression here at run 25890925457: two
  # postgres-fanout wire-points were gated `#[cfg(feature = "sal")]`
  # instead of `#[cfg(feature = "sal-postgres")]`, so they compiled
  # under `sal-postgres` (where the symbol exists) AND default (where
  # the cfg gate skips them) but FAILED to compile under sal-only.
  # This job closes that observability gap by exercising the same
  # cargo invocation the A2A workflow uses, plus the four standard
  # gates (clippy / build / lib tests) at the same feature combo.
  # Skipped on docs-only PRs alongside the rest of the heavy matrix.
  sal-feature:
    name: SAL-only feature gate
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # #1405 — the sal-feature release build (`cargo build --release
      # --features sal`) is heavy enough to risk both rust-lld tmpfs
      # exhaustion and runner _diag-log ENOSPC. Prune unused runner
      # tooling early so neither surface trips this job. Same recipe as
      # the `check` and `coverage` jobs.
      - name: Free disk (ubuntu-latest, #1405 fix)
        run: |
          set -eu
          echo "::group::Disk usage before cleanup"
          df -h /
          echo "::endgroup::"
          sudo rm -rf /usr/share/dotnet              || true  # ~17 GiB
          sudo rm -rf /opt/hostedtoolcache/CodeQL    || true  # ~5 GiB
          sudo rm -rf /usr/local/lib/android         || true  # ~13 GiB
          sudo rm -rf /opt/ghc                       || true  # ~5 GiB
          sudo apt-get clean
          echo "::group::Disk usage after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (sal feature)
        run: cargo clippy --features sal -- -D warnings -D clippy::all -D clippy::pedantic

      - name: Build release (sal feature)
        run: cargo build --release --features sal

      - name: Run lib tests (sal feature)
        env:
          AI_MEMORY_NO_CONFIG: "1"
        run: cargo test --features sal --lib

  # v0.6.5 — Dockerfile-build smoke. Runs on EVERY push to main / develop /
  # release/** AND on EVERY PR that touches code. Builds the Docker image;
  # does NOT push to GHCR. Catches Dockerfile drift (missing COPY of new
  # files referenced by include_str!, glibc mismatch from build/runtime
  # base drift, etc.) BEFORE we cut a release tag.
  #
  # Retrospective: v0.6.3 added include_str! refs to migrations/sqlite/
  # but the Dockerfile didn't COPY migrations/. v0.6.4's image built
  # but used rust:1.94-slim (trixie, glibc 2.41) on top of bookworm
  # runtime (glibc 2.36) — built but failed at runtime with
  # "version GLIBC_2.39 not found". Both bugs were caught at release
  # time, not PR time. This job closes that gap.
  #
  # Skipped on docs-only PRs — a Dockerfile build can't possibly differ
  # when only /docs/ or *.md changed.
  dockerfile-validate:
    name: Dockerfile build (no push)
    needs: classify
    runs-on: ubuntu-latest
    # Skip on tag pushes — the docker job below handles those (with push).
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && needs.classify.outputs.docs_only != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-memory:ci-validate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the built image
        run: |
          docker run --rm ai-memory:ci-validate --version
          docker run --rm ai-memory:ci-validate --help | head -20

  # Coverage is now a HARD GATE (top-shelf engineering). Two enforcement
  # tiers protect the line-coverage number from regression:
  #
  #   1. Absolute floor (`MIN_COVERAGE_PCT`) — the line below which CI
  #      simply refuses to merge regardless of the historical baseline.
  #      Set at the current measured coverage, rounded DOWN to the nearest
  #      5 percentage points so it can only ever be raised, never lowered.
  #
  #   2. Ratchet (`.coverage-baseline`) — the file at the repo root pins
  #      the most recent measured coverage. Each run re-asserts that the
  #      current number is >= baseline - 0.5% (small slack absorbs the
  #      sub-percent jitter that comes from `target/` cache differences).
  #      When a PR materially raises coverage, a follow-up commit can
  #      bump the file; CI never lowers it automatically.
  #
  # Skipped on docs-only PRs (no Rust changed, no coverage delta possible).
  # Job name is `Code Coverage` — must be added to branch protection
  # required-status-checks for the gate to actually block merges.
  coverage:
    name: Code Coverage
    needs: classify
    if: needs.classify.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    env:
      # v0.7.x (#1148) — mold linker + line-only DWARF keep peak
      # linker RSS under the 7 GB ubuntu-latest ceiling for the
      # instrumented `--features sal` build. We apply the trim via
      # CARGO_PROFILE_DEV_* env vars (NOT `--profile coverage`) so the
      # post-build `cargo llvm-cov report` step finds the object
      # files under the default `target/llvm-cov-target/debug/` path
      # the `[profile.coverage]` artifact dir would have shifted.
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      CARGO_PROFILE_DEV_DEBUG: "1"
      CARGO_PROFILE_DEV_LTO: "false"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk + add swap (#1148 belt-and-suspenders)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          sudo fallocate -l 8G /swapfile-1148
          sudo chmod 600 /swapfile-1148
          sudo mkswap /swapfile-1148
          sudo swapon /swapfile-1148
          echo "::group::memory + disk after"
          free -h
          df -h /
          echo "::endgroup::"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install mold linker (#1148)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          mold --version

      - uses: Swatinem/rust-cache@v2

      # v0.6.3 W12-CI-fix: switched from cargo-tarpaulin to cargo-llvm-cov.
      # tarpaulin 0.32.x trips a `pulp` 0.22.2 const-eval panic
      # (`CheckSameSize::<i8, u16>::VALID`) under its source-based
      # instrumentation. llvm-cov uses LLVM-native source-based instrumentation
      # which doesn't hit the bug, and matches the canonical local measurement
      # command the coverage campaign used (93.08% headline number per
      # docs/evidence.html).
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        env:
          AI_MEMORY_NO_CONFIG: "1"
        # v0.7.x (#1148) — dev profile WITH env-var overrides
        # (debuginfo=1, lto=false from the job-level env block above)
        # keeps artifacts under target/llvm-cov-target/debug/ where
        # the report step expects them, while still trimming the
        # instrumented binary enough that mold can link it under the
        # 7 GB runner ceiling. `--test-threads=1` caps memory-parallel
        # test execution under the trimmed runner profile.
        run: |
          cargo llvm-cov --features sal --no-fail-fast --html --output-dir coverage -- --test-threads=1
          # `cargo llvm-cov report` reads the saved profile data and does
          # not accept `--features` (would error: "invalid option
          # '--features' for subcommand 'report'"). The earlier pipe-to-
          # `tee` form masked that failure since `tee` always exits 0.
          cargo llvm-cov report --summary-only | tee coverage/summary.txt

      # Hard absolute floor — the catastrophic-regression backstop. The
      # locally measured TOTAL line coverage at the time of this commit
      # was 93.13% (cargo llvm-cov, --features sal, --test-threads=2).
      # The absolute floor is 90 — that value is current coverage rounded
      # DOWN to the nearest 5 percentage points so it can only ever be
      # raised, never lowered, and so routine churn doesn't trip it.
      # The tight day-to-day enforcement happens in the ratchet step
      # below; this floor is the "delete-half-the-tests" backstop.
      - name: Enforce absolute coverage floor (>=90% lines)
        env:
          AI_MEMORY_NO_CONFIG: "1"
          MIN_COVERAGE_PCT: "90"
        run: |
          set -euo pipefail
          # Extract TOTAL line-coverage % from the saved summary. The
          # llvm-cov text summary's last row is the TOTAL; the line-cov
          # column is the 10th whitespace-separated field and includes a
          # trailing %.
          PCT=$(awk '/^TOTAL/ {gsub("%","",$10); print $10}' coverage/summary.txt)
          if [ -z "${PCT:-}" ]; then
            echo "::error::could not parse line-coverage % from coverage/summary.txt"
            cat coverage/summary.txt
            exit 1
          fi
          echo "::notice::measured line coverage = ${PCT}% (absolute floor ${MIN_COVERAGE_PCT}%)"
          echo "COVERAGE_PCT=${PCT}" >> "$GITHUB_ENV"
          awk -v pct="$PCT" -v floor="$MIN_COVERAGE_PCT" 'BEGIN { if (pct + 0 < floor + 0) { printf "::error::coverage %.2f%% is below absolute floor %s%%\n", pct, floor; exit 1 } }'

      # Ratchet — re-assert that we have not regressed against the
      # tracked baseline more than the 0.5% slack window. PRs that raise
      # coverage are encouraged to bump `.coverage-baseline` in the same
      # commit so future PRs benefit from the higher floor.
      - name: Enforce coverage ratchet (>= baseline - 0.5%)
        env:
          AI_MEMORY_NO_CONFIG: "1"
          RATCHET_SLACK_PCT: "0.5"
        run: |
          set -euo pipefail
          if [ ! -f .coverage-baseline ]; then
            echo "::warning::.coverage-baseline missing — skipping ratchet (absolute floor still applies)"
            exit 0
          fi
          BASELINE=$(tr -d '[:space:]' < .coverage-baseline)
          PCT="${COVERAGE_PCT:-0}"
          echo "::notice::ratchet check: coverage=${PCT}% baseline=${BASELINE}% slack=${RATCHET_SLACK_PCT}%"
          awk -v pct="$PCT" -v base="$BASELINE" -v slack="$RATCHET_SLACK_PCT" 'BEGIN { min = base + 0 - slack - 0; if (pct + 0 < min) { printf "::error::coverage %.2f%% regressed below ratchet floor %.2f%% (baseline %.2f%% - %.2f%% slack)\n", pct, min, base, slack; exit 1 } printf "::notice::ratchet OK: %.2f%% >= %.2f%%\n", pct, min }'

      # Render the sticky-comment markdown to a file so the action can
      # `path:`-include it. Inlining `$(cat ...)` inside the action's
      # `message:` value would NOT shell-expand — it would post the
      # literal `$(cat ...)` text — so we materialise the body here.
      - name: Render coverage comment body
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_PCT: ${{ env.COVERAGE_PCT }}
        run: |
          set -euo pipefail
          BASELINE=$(tr -d '[:space:]' < .coverage-baseline 2>/dev/null || echo "(unset)")
          {
            echo "### Code Coverage Gate"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| measured | **${COVERAGE_PCT}%** lines |"
            echo "| absolute floor | 90% |"
            echo "| ratchet baseline | ${BASELINE}% (slack 0.5%) |"
            echo ""
            echo "<details><summary>llvm-cov summary</summary>"
            echo ""
            echo '```'
            cat coverage/summary.txt 2>/dev/null || echo "(summary not available)"
            echo '```'
            echo ""
            echo "</details>"
          } > coverage/comment.md

      # Sticky PR comment with the measured coverage number. Re-uses a
      # marker so the comment is updated in place across pushes instead
      # of accumulating one comment per CI run.
      - name: Post coverage to PR (sticky)
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-gate
          path: coverage/comment.md

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
