#
# v0.7.0 Posture-1a (issue #1068) — cbindgen config for the ai_memory
# static library shipped to mobile (iOS .xcframework + Android .aar).
# Generates `include/ai_memory.h` from `#[no_mangle] extern "C"`
# items declared in `src/lib.rs` (or any submodule re-exported with
# `pub use`). Invoked from `.github/workflows/release.yml` via
#   cbindgen --config cbindgen.toml --crate ai-memory \
#            --output include/ai_memory.h
# Default builds (cargo build / cargo test) DO NOT regenerate the
# header — that's a release-pipeline-only step so the header stays
# byte-identical between CI runs unless someone changed an
# `extern "C"` item.
#
# Until the C-callable FFI surface lands (v0.7.x #1068 Layer 2
# follow-up or #1069 wrapper SDK), this config produces a stub
# header containing only the language preamble. That's the expected
# v0.7.0 state — the BUILD pipeline is the v0.7.0 Layer 2
# deliverable; the actual `#[no_mangle] extern "C"` items follow.

language = "C"
header = """
/*
 * ai-memory v0.7.0 — Posture-1a mobile FFI header
 * Auto-generated by cbindgen. DO NOT EDIT BY HAND.
 *
 * SPDX-License-Identifier: Apache-2.0
 * Copyright 2026 AlphaOne LLC
 */"""
include_guard = "AI_MEMORY_H"
cpp_compat = true
pragma_once = true

# Default include behavior — only items explicitly marked
# `#[no_mangle] extern "C"` (or via `#[cbindgen::register]`) end up
# in the header. Keeps the surface intentional instead of leaking
# every public Rust type that happens to be `#[repr(C)]`-able.
[export]
prefix = "ai_memory_"

[parse]
parse_deps = false

# Apple / iOS specific: the .xcframework's umbrella header may
# `#include` this file from Objective-C, so we add the standard
# Foundation guards in case a future FFI surface needs NSString
# bridging. Until then, the section is inert.
[defines]
"target_os = ios" = "AI_MEMORY_TARGET_IOS"
"target_os = android" = "AI_MEMORY_TARGET_ANDROID"
